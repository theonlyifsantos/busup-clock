<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOBAL OPS CENTER - BUSUP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --accent: #01C278; 
    --primary: #fff;
    --bg: #0a0a0a;
    --card-bg: #1a1a1a;
    --text-city: #fff; /* Força o branco puro para máxima leitura de longe */
    --header-border: #333;
    --remove: #ff4d4d;
  }

  body.light-mode {
    --primary: #000;
    --bg: #fff;
    --card-bg: #fff;
    --text-city: #111;
    --header-border: #eee;
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--primary);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 10px 40px;
    border-bottom: 2px solid var(--header-border);
    align-items: center;
    flex-shrink: 0;
  }

  :fullscreen header, :-webkit-full-screen header,
  :fullscreen .region-controls, :-webkit-full-screen .region-controls,
  :fullscreen .btn-remove, :-webkit-full-screen .btn-remove {
    display: none !important;
  }

  .main-branding {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    padding: 5px 0;
    flex-shrink: 0;
  }

  .main-logo {
    height: 40px;
    filter: invert(48%) sepia(94%) saturate(1515%) hue-rotate(125deg) brightness(96%) contrast(101%);
  }

  .title-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .title-line { width: 100%; border-top: 2px dashed var(--accent); opacity: 0.6; }
  .main-title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 5px;
    color: var(--accent);
    text-transform: uppercase;
    margin: 0;
  }

  .container {
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 12px;
    overflow: hidden;
    min-height: 0;
  }

  .region-block {
    display: flex;
    flex-direction: column;
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 10px;
    background: var(--card-bg);
    position: relative;
    min-height: 0;
    box-sizing: border-box;
  }

  .region-title {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }

  .region-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 5px;
  }

  select {
    background: var(--card-bg);
    color: var(--primary);
    border: 2px solid var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }

  .clocks-display {
    display: flex;
    justify-content: center; 
    align-items: center; 
    flex: 1;
    min-height: 0;
    gap: 20px; 
    width: 100%;
  }

  /* ==========================================================================
     NOVA ESTRUTURA VERTICAL DO CARD (BLOCO EM CIMA, TEXTO EMBAIXO)
     ========================================================================== */
  .country-mini-card {
    display: flex;
    flex-direction: column; /* Alinha o bloco visual acima e o texto abaixo */
    align-items: center;
    justify-content: center;
    gap: 4px; 
    position: relative;
    padding: 5px;
    box-sizing: border-box;
    flex: 1;
    min-width: 0;
    border: 1px solid transparent; 
  }

  /* Linha superior: Junta a bandeira ao relógio com espaço mínimo */
  .card-top-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 6px; /* Super unido agora */
    width: 100%;
  }

  .btn-remove {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--remove);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-weight: 900;
    cursor: pointer;
    z-index: 10;
  }

  .identity-block { 
    display: flex; 
    align-items: center; 
    justify-content: center;
    width: 65px;         
    max-width: 65px;     
    min-width: 65px;     
    flex-shrink: 0;
  }
  
  .time-block { 
    display: flex; 
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    min-width: 0;
  }

  .date-display {
    font-size: clamp(10px, 0.9vw, 13px);
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    line-height: 1;
    margin-bottom: 2px;
  }

  .time {
    font-weight: 900; 
    line-height: 0.8;
    letter-spacing: -1.5px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    font-size: clamp(45px, 5vw, 85px); 
  }

  /* TEXTO ABAIXO DO RELÓGIO: AGORA MUITO MAIOR */
  .city { 
    font-weight: 900; 
    text-transform: uppercase; 
    color: var(--text-city); 
    text-align: center;
    line-height: 1.1;
    letter-spacing: 0.5px;
    word-break: normal;       
    overflow-wrap: break-word;      
    white-space: normal; 
    font-size: clamp(12px, 2vw, 26px); /* Perfeito para ler de longe */
    width: 100%; /* Ocupa exatamente a largura total combinada acima */
    max-width: 100%;
    margin-top: 4px;
  }

  .flag-img { 
    width: 65px; 
    height: auto; 
    border: 2px solid var(--accent); 
    border-radius: 5px; 
    box-sizing: border-box;
  } 

  /* Ajuste fino para os blocos com mais densidade (América do Norte com 4 relógios) */
  .secondary-clock .time {
    font-size: clamp(38px, 4.2vw, 68px); 
  }

  .secondary-clock .city {
    font-size: clamp(11px, 1.5vw, 18px); /* Reduz sutilmente apenas aqui para não estourar a tela */
  }
  
  /* Grid de layout */
  #block-europa { flex: 1; }

  .middle-layout { 
    display: flex; 
    gap: 15px; 
    flex: 1.1;
    min-height: 0;
    width: 100%;
  }
  
  #block-sul { flex: 2; }      
  #block-central { flex: 1; }  

  .secondary-clock { flex: 1; } 

  .seconds { font-size: 0.5em; color: var(--accent); margin-left: 2px; font-weight: 900; }

  .btn-ui {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 900;
    font-size: 10px;
    text-transform: uppercase;
  }
  .btn-ui.dark { background: #333; }
</style>
</head>
<body>

<header id="header">
  <div style="font-size: 11px; font-weight: 900; color: var(--accent);">BUSUP OPS DASHBOARD</div>
  <div class="header-btns">
    <button onclick="toggleDarkMode()" class="btn-ui dark" id="dark-btn">MODO CLARO</button>
    <button onclick="toggleFullScreen()" class="btn-ui">TELA CHEIA</button>
  </div>
</header>

<div class="container">
  <div class="main-branding">
    <img src="https://www.busup.com/hubfs/BUS%20-%202023/busup-logo.svg" alt="Logo" class="main-logo">
    <div class="title-wrapper">
      <div class="title-line"></div>
      <h1 class="main-title">GLOBAL OPS CENTER</h1>
      <div class="title-line"></div>
    </div>
  </div>

  <div class="region-block large-font" id="block-europa"></div>

  <div class="middle-layout">
    <div class="region-block large-font" id="block-sul"></div>
    <div class="region-block large-font" id="block-central"></div>
  </div>

  <div class="region-block secondary-clock" id="block-norte"></div>
</div>

<script>
const regionalDB = {
  "Europa": [
    { tz: "Europe/Lisbon", name: "PORTUGAL", flag: "pt", default: true },
    { tz: "Europe/Madrid", name: "ESPANHA", flag: "es", default: true },
    { tz: "Europe/Paris", name: "FRANÇA", flag: "fr", default: true }
  ],
  "América do Sul": [
    { tz: "America/Sao_Paulo", name: "BR (SÃO PAULO)", flag: "br", default: true },
    { tz: "America/Manaus", name: "BR (MANAUS)", flag: "br", default: true }
  ],
  "América Central": [
    { tz: "America/Mexico_City", name: "MÉXICO (CDMX e TORREÓN)", flag: "mx", default: true }
  ],
  "América do Norte": [
    { tz: "America/New_York", name: "EUA (ATLANTA / INDIANA / PENSILVANIA)", flag: "us", default: true },
    { tz: "America/Denver", name: "EUA (NEVADA / COLORADO)", flag: "us", default: true },
    { tz: "America/Chicago", name: "EUA (HOUSTON / MISSISSIPPI)", flag: "us", default: true },
    { tz: "America/Los_Angeles", name: "EUA (SEATTLE)", flag: "us", default: true }
  ]
};

const config = {
  "Europa": { id: "block-europa" }, "América do Sul": { id: "block-sul" },
  "América Central": { id: "block-central" }, "América do Norte": { id: "block-norte" }
};

let activeClocks = [];

function init() {
  Object.keys(config).forEach(reg => {
    const data = config[reg];
    const parent = document.getElementById(data.id);
    const optionsHtml = regionalDB[reg].map((item, index) => `<option value="${index}">${item.name}</option>`).join('');
    parent.innerHTML = `
      <div class="region-title">${reg}</div>
      <div class="region-controls">
        <select id="select-${data.id}"><option value="">+ LOCAL</option>${optionsHtml}</select>
        <button class="btn-ui" onclick="addClock('${reg}', '${data.id}')">OK</button>
      </div>
      <div class="clocks-display" id="display-${data.id}"></div>
    `;
    regionalDB[reg].forEach(item => { if(item.default) render(data.id, item.tz, item.name, item.flag); });
  });
}

/* RENDEREZAÇÃO REESTRUTURADA COM TEXTO ABAIXO DA LINHA DO RELÓGIO */
function render(containerId, tz, name, flag) {
  const display = document.getElementById(`display-${containerId}`);
  if(activeClocks.some(c => c.tz === tz && c.containerId === containerId)) return;
  const uniqueId = `t-${Math.random().toString(36).substr(2, 9)}`;
  const card = document.createElement("div");
  card.className = "country-mini-card";
  card.id = `card-${uniqueId}`;
  card.innerHTML = `
    <button class="btn-remove" onclick="removeClock('${uniqueId}')">×</button>
    <div class="card-top-row">
        <div class="identity-block">
            <img class="flag-img" src="https://flagcdn.com/w160/${flag}.png">
        </div>
        <div class="time-block">
            <div class="date-display" id="date-${uniqueId}">-- ------- ----</div>
            <div class="time" id="${uniqueId}">00:00<span class="seconds">00</span></div>
        </div>
    </div>
    <div class="city">${name}</div>
  `;
  display.appendChild(card);
  activeClocks.push({ id: uniqueId, tz, containerId });
}

function addClock(regionName, containerId) {
  const select = document.getElementById(`select-${containerId}`);
  if(select.value !== "") {
    const item = regionalDB[regionName][select.value];
    render(containerId, item.tz, item.name, item.flag);
    select.value = "";
  }
}

function removeClock(id) {
  const el = document.getElementById(`card-${id}`);
  if(el) { el.remove(); activeClocks = activeClocks.filter(c => c.id !== id); }
}

function update() {
  const now = new Date();
  activeClocks.forEach(c => {
    const timeEl = document.getElementById(c.id);
    const dateEl = document.getElementById(`date-${c.id}`);
    if(timeEl && dateEl) {
      try {
        const timeStr = now.toLocaleTimeString("pt-BR", {timeZone: c.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
        const [h, m, s] = timeStr.split(':');
        timeEl.innerHTML = `${h}:${m}<span class="seconds">${s}</span>`;
        const dateStr = now.toLocaleDateString("en-GB", {timeZone: c.tz, day:'2-digit', month:'long', year:'numeric'});
        dateEl.innerText = dateStr;
      } catch(e) {
        console.log("Erro no fuso: " + c.tz, e);
      }
    }
  });
}

function launchFullScreen() {
  const docEl = document.documentElement;
  if (docEl.requestFullscreen) { docEl.requestFullscreen(); }
  else if (docEl.mozRequestFullScreen) { docEl.mozRequestFullScreen(); }
  else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen(); }
  else if (docEl.msRequestFullscreen) { docEl.msRequestFullscreen(); }
}

function toggleFullScreen() {
  if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
    launchFullScreen();
  } else {
    if (document.exitFullscreen) { document.exitFullscreen(); }
  }
}

function toggleDarkMode() {
  document.body.classList.toggle('light-mode');
  const btn = document.getElementById('dark-btn');
  btn.innerText = document.body.classList.contains('light-mode') ? 'MODO NOTURNO' : 'MODO CLARO';
}

window.onload = function() {
  setTimeout(launchFullScreen, 1000); 
  document.body.addEventListener('click', function fallbackRequest() {
    launchFullScreen();
    document.body.removeEventListener('click', fallbackRequest); 
  });
};

init();
setInterval(update, 1000);
update();
</script>
</body>
</html>
