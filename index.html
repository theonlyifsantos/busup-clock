<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOBAL OPS CENTER - BUSUP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --accent: #01C278; 
    --primary: #000;
    --bg: #fff;
    --card-bg: #fff;
    --text-city: #333;
    --header-border: #eee;
    --remove: #ff4d4d;
  }

  body.dark-mode {
    --primary: #fff;
    --bg: #0a0a0a;
    --card-bg: #1a1a1a;
    --text-city: #aaa;
    --header-border: #333;
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--primary);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 10px 40px;
    border-bottom: 2px solid var(--header-border);
    align-items: center;
    flex-shrink: 0;
  }

  :fullscreen header, :-webkit-full-screen header,
  :fullscreen .region-controls, :-webkit-full-screen .region-controls,
  :fullscreen .btn-remove, :-webkit-full-screen .btn-remove {
    display: none !important;
  }

  .main-branding {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    padding: 10px 0;
    flex-shrink: 0;
  }

  .main-logo {
    height: 40px;
    filter: invert(48%) sepia(94%) saturate(1515%) hue-rotate(125deg) brightness(96%) contrast(101%);
  }

  .title-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .title-line { width: 100%; border-top: 2px dashed var(--accent); opacity: 0.6; }
  .main-title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 5px;
    color: var(--accent);
    text-transform: uppercase;
    margin: 0;
  }

  .container {
    padding: 0 30px 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 15px;
    overflow: hidden;
    min-height: 0;
  }

  .region-block {
    display: flex;
    flex-direction: column;
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 10px;
    background: var(--card-bg);
    flex: 1;
    position: relative;
    min-height: 0;
  }

  .region-title {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }

  .region-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 5px;
  }

  select {
    background: var(--card-bg);
    color: var(--primary);
    border: 2px solid var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }

  .clocks-display {
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    flex: 1;
    min-height: 0;
    gap: 10px;
  }

  .country-mini-card {
    display: flex;
    align-items: center;
    gap: 15px;
    position: relative;
    padding: 5px;
  }

  .btn-remove {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--remove);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-weight: 900;
    cursor: pointer;
    z-index: 10;
  }

  .identity-block { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 8px; 
    width: 130px;
  }
  
  .time-block { display: flex; flex-direction: column; align-items: center; }

  .date-display {
    font-size: clamp(10px, 1vw, 13px);
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .time {
    font-weight: 900; 
    line-height: 0.9;
    letter-spacing: -2px;
  }

  .city { 
    font-weight: 900; 
    text-transform: uppercase; 
    color: var(--text-city); 
    text-align: center;
    line-height: 1.2;
    word-wrap: break-word;
    overflow-wrap: break-word;
    font-size: 14px;
  }

  .large-font .time { font-size: clamp(40px, 6vw, 90px); }
  .large-font .flag-img { height: clamp(40px, 5vw, 75px); border: 3px solid var(--accent); border-radius: 8px; }
  .large-font .city { font-size: 16px; }

  /* REAJUSTE DE PROPORÇÃO SOLICITADO */
  .middle-layout { 
    display: flex; 
    gap: 15px; 
    flex: 1.1;
    min-height: 0;
  }
  
  #block-sul { flex: 1.3; }      /* América do Sul ganha mais espaço para os dois cards */
  #block-central { flex: 0.7; }  /* América Central reduzida com apenas um card */

  .secondary-clock { flex: 0.8; }
  .secondary-clock .time { font-size: clamp(28px, 3.5vw, 50px); }
  .secondary-clock .flag-img { height: clamp(35px, 4vw, 50px); border: 2px solid var(--accent); border-radius: 6px; }
  .secondary-clock .city { font-size: 12px; }
  .secondary-clock .identity-block { width: 100px; }

  .seconds { font-size: 0.45em; color: var(--accent); margin-left: 4px; font-weight: 900; }

  .btn-ui {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 900;
    font-size: 10px;
    text-transform: uppercase;
  }
  .btn-ui.dark { background: #333; }
</style>
</head>
<body>

<header id="header">
  <div style="font-size: 11px; font-weight: 900; color: var(--accent);">BUSUP OPS DASHBOARD</div>
  <div class="header-btns">
    <button onclick="toggleDarkMode()" class="btn-ui dark" id="dark-btn">MODO NOTURNO</button>
    <button onclick="toggleFullScreen()" class="btn-ui">TELA CHEIA</button>
  </div>
</header>

<div class="container">
  <div class="main-branding">
    <img src="https://www.busup.com/hubfs/BUS%20-%202023/busup-logo.svg" alt="Logo" class="main-logo">
    <div class="title-wrapper">
      <div class="title-line"></div>
      <h1 class="main-title">GLOBAL OPS CENTER</h1>
      <div class="title-line"></div>
    </div>
  </div>

  <div class="region-block large-font" id="block-europa"></div>

  <div class="middle-layout">
    <div class="region-block large-font" id="block-sul"></div>
    <div class="region-block large-font" id="block-central"></div>
  </div>

  <div class="region-block secondary-clock" id="block-norte"></div>
</div>

<script>
const regionalDB = {
  "Europa": [
    { tz: "Europe/Lisbon", name: "Portugal", flag: "pt", default: true },
    { tz: "Europe/Madrid", name: "Espanha", flag: "es", default: true },
    { tz: "Europe/Paris", name: "França", flag: "fr", default: true }
  ],
  "América do Sul": [
    { tz: "America/Sao_Paulo", name: "BR (São Paulo)", flag: "br", default: true },
    { tz: "America/Manaus", name: "BR (Manaus)", flag: "br", default: true } // Movido de forma fixa para cá
  ],
  "América Central": [
    { tz: "America/Mexico_City", name: "MÉXICO (CDMX e Torreón)", flag: "mx", default: true }
  ],
  "América do Norte": [
    { tz: "America/New_York", name: "EUA (Atlanta / Indiana / Pensilvania)", flag: "us", default: true },
    { tz: "America/Denver", name: "EUA (Nevada / Colorado)", flag: "us", default: true },
    { tz: "America/Chicago", name: "EUA (Houston / Mississippi)", flag: "us", default: true },
    { tz: "America/Los_Angeles", name: "EUA (Seattle)", flag: "us", default: true }
  ]
};

const config = {
  "Europa": { id: "block-europa" }, "América do Sul": { id: "block-sul" },
  "América Central": { id: "block-central" }, "América do Norte": { id: "block-norte" }
};

let activeClocks = [];

function init() {
  Object.keys(config).forEach(reg => {
    const data = config[reg];
    const parent = document.getElementById(data.id);
    const optionsHtml = regionalDB[reg].map((item, index) => `<option value="${index}">${item.name}</option>`).join('');
    parent.innerHTML = `
      <div class="region-title">${reg}</div>
      <div class="region-controls">
        <select id="select-${data.id}"><option value="">+ LOCAL</option>${optionsHtml}</select>
        <button class="btn-ui" onclick="addClock('${reg}', '${data.id}')">OK</button>
      </div>
      <div class="clocks-display" id="display-${data.id}"></div>
    `;
    regionalDB[reg].forEach(item => { if(item.default) render(data.id, item.tz, item.name, item.flag); });
  });
}

  const display = document.getElementById(`display-${
