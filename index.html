<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOBAL OPS CENTER - BUSUP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --accent: #01C278; 
    --primary: #fff;
    /* Fundo dos containers em formato de vidro escuro transparente (Opacidade em 45%) */
    --card-bg: rgba(26, 26, 26, 0.45); 
    --text-city: #fff; 
    --header-border: rgba(255, 255, 255, 0.15);
    --remove: #ff4d4d;
  }

  body.light-mode {
    --primary: #000;
    --card-bg: rgba(255, 255, 255, 0.65);
    --text-city: #111;
    --header-border: rgba(0, 0, 0, 0.1);
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    /* Película escura protetora + Sua imagem de fundo do GitHub */
    background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('Fundo.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: var(--primary);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    transition: background-image 0.3s ease;
  }

  /* Adiciona uma película clara se o modo claro for ativado */
  body.light-mode {
    background-image: linear-gradient(rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.65)), url('Fundo.jpg');
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 10px 40px;
    background: rgba(0, 0, 0, 0.25);
    border-bottom: 2px solid var(--header-border);
    align-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 100;
  }
  
  body.light-mode header {
    background: rgba(255, 255, 255, 0.25);
  }

  :fullscreen header, :-webkit-full-screen header,
  :fullscreen .region-controls, :-webkit-full-screen .region-controls,
  :fullscreen .btn-remove, :-webkit-full-screen .btn-remove {
    display: none !important;
  }

  .main-branding {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    padding: 5px 0;
    flex-shrink: 0;
  }

  .main-logo {
    height: 40px;
    filter: invert(48%) sepia(94%) saturate(1515%) hue-rotate(125deg) brightness(96%) contrast(101%);
  }

  .title-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .title-line { width: 100%; border-top: 2px dashed var(--accent); opacity: 0.6; }
  .main-title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 5px;
    color: var(--accent);
    text-transform: uppercase;
    margin: 0;
  }

  .container {
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 12px;
    overflow: hidden;
    min-height: 0;
  }

  .region-block {
    display: flex;
    flex-direction: column;
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 10px;
    background: var(--card-bg);
    /* Efeito de Vidro Fosco atrás dos relógios */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: relative;
    min-height: 0;
    box-sizing: border-box;
  }

  .region-title {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }

  .region-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 5px;
    position: relative;
    z-index: 50;
  }

  select {
    background: rgba(0, 0, 0, 0.5);
    color: #fff;
    border: 2px solid var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }
  
  body.light-mode select {
    background: rgba(255, 255, 255, 0.8);
    color: #000;
  }

  .clocks-display {
    display: flex;
    justify-content: center; 
    align-items: center; 
    flex: 1;
    min-height: 0;
    gap: 20px; 
    width: 100%;
  }

  .country-mini-card {
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    gap: 2px; 
    position: relative;
    padding: 5px;
    box-sizing: border-box;
    flex: 1;
    min-width: 0;
    border: 1px solid transparent; 
  }

  .card-content-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .card-top-row {
    display: flex;
    flex-direction: row;
    align-items: center; 
    justify-content: center;
    gap: 8px; 
    width: 100%;
  }

  .btn-remove {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--remove);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-weight: 900;
    cursor: pointer;
    z-index: 110;
  }

  .identity-block { 
    display: flex; 
    align-items: center; 
    justify-content: center;
    width: 65px;         
    max-width: 65px;     
    min-width: 65px;     
    flex-shrink: 0;
  }
  
  .time-block { 
    display: flex; 
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    min-width: 0;
  }

  .date-display {
    font-size: clamp(12px, 1.1vw, 17px); 
    font-weight: 900; 
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    line-height: 1;
    margin-bottom: 6px; 
  }

  .time {
    font-weight: 900; 
    line-height: 0.8;
    letter-spacing: -1.5px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    font-size: clamp(45px, 5.2vw, 90px); 
  }

  .city { 
    font-weight: 900; 
    text-transform: uppercase; 
    color: var(--text-city); 
    text-align: center;
    line-height: 1.05;
    letter-spacing: 0.5px;
    word-break: normal;       
    overflow-wrap: break-word;      
    white-space: normal; 
    font-size: clamp(14px, 2.3vw, 32px); 
    width: 100%; 
    max-width: 100%;
    margin-top: 6px;
  }

  .flag-img { 
    width: 65px; 
    height: auto; 
    border: 2px solid var(--accent); 
    border-radius: 5px; 
    box-sizing: border-box;
  } 

  .secondary-clock .time {
    font-size: clamp(38px, 4.2vw, 68px); 
  }

  .secondary-clock .city {
    font-size: clamp(12px, 1.7vw, 22px); 
  }
  
  #block-europa { flex: 1; }

  .middle-layout { 
    display: flex; 
    gap: 15px; 
    flex: 1.1;
    min-height: 0;
    width: 100%;
  }
  
  #block-sul { flex: 2; }      
  #block-central { flex: 1; }  

  .secondary-clock { flex: 1; } 

  .seconds { font-size: 0.5em; color: var(--accent); margin-left: 2px; font-weight: 900; }

  .btn-ui {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 900;
    font-size: 10px;
    text-transform: uppercase;
  }
  .btn-ui.dark { background: #333; }
</style>
</head>
<body>

<header id="header">
  <div style="font-size: 11px; font-weight: 900; color: var(--accent);">BUSUP OPS DASHBOARD</div>
  <div class="header-btns">
    <button onclick="event.stopPropagation(); toggleDarkMode();" class="btn-ui dark" id="dark-btn">LIGHT MODE</button>
    <button onclick="event.stopPropagation(); toggleFullScreen();" class="btn-ui">FULLSCREEN</button>
  </div>
</header>

<div class="container">
  <div class="main-branding">
    <img src="https://www.busup.com/hubfs/BUS%20-%202023/busup-logo.svg" alt="Logo" class="main-logo">
    <div class="title-wrapper">
      <div class="title-line"></div>
      <h1 class="main-title">GLOBAL OPS CENTER</h1>
      <div class="title-line"></div>
    </div>
  </div>

  <div class="region-block large-font" id="block-europa"></div>

  <div class="middle-layout">
    <div class="region-block large-font" id="block-sul"></div>
    <div class="region-block large-font" id="block-central"></div>
  </div>

  <div class="region-block secondary-clock" id="block-norte"></div>
</div>

<script>
const regionalDB = {
  "Europe": [
    { tz: "Europe/Lisbon", name: "PORTUGAL", flag: "pt", default: true },
    { tz: "Europe/Madrid", name: "SPAIN", flag: "es", default: true },
    { tz: "Europe/Paris", name: "FRANCE", flag: "fr", default: true }
  ],
  "South America": [
    { tz: "America/Manaus", name: "BRAZIL (MANAUS)", flag: "br", default: true },
    { tz: "America/Sao_Paulo", name: "BRAZIL (SÃO PAULO)", flag: "br", default: true }
    
  ],
  "Central America": [
    { tz: "America/Mexico_City", name: "MEXICO (CDMX & TORREÓN)", flag: "mx", default: true }
  ],
  "North America": [
    { tz: "America/Los_Angeles", name: "USA (SEATTLE)", flag: "us", default: true },
    { tz: "America/Denver", name: "USA (NEVADA / COLORADO)", flag: "us", default: true },
    { tz: "America/Chicago", name: "USA (HOUSTON / MISSISSIPPI)", flag: "us", default: true },
    { tz: "America/New_York", name: "USA (ATLANTA / INDIANA / PENNSYLVANIA)", flag: "us", default: true }
  ]
};

const config = {
  "Europe": { id: "block-europa" }, "South America": { id: "block-sul" },
  "Central America": { id: "block-central" }, "North America": { id: "block-norte" }
};

let activeClocks = [];

function init() {
  Object.keys(config).forEach(reg => {
    const data = config[reg];
    const parent = document.getElementById(data.id);
    const optionsHtml = regionalDB[reg].map((item, index) => `<option value="${index}">${item.name}</option>`).join('');
    parent.innerHTML = `
      <div class="region-title">${reg}</div>
      <div class="region-controls">
        <select id="select-${data.id}" onclick="event.stopPropagation()"><option value="">+ LOCATION</option>${optionsHtml}</select>
        <button class="btn-ui" onclick="event.stopPropagation(); addClock('${reg}', '${data.id}')">OK</button>
      </div>
      <div class="clocks-display" id="display-${data.id}"></div>
    `;
    regionalDB[reg].forEach(item => { if(item.default) render(data.id, item.tz, item.name, item.flag); });
  });
}

function render(containerId, tz, name, flag) {
  const display = document.getElementById(`display-${containerId}`);
  if(activeClocks.some(c => c.tz === tz && c.containerId === containerId)) return;
  const uniqueId = `t-${Math.random().toString(36).substr(2, 9)}`;
  const card = document.createElement("div");
  card.className = "country-mini-card";
  card.id = `card-${uniqueId}`;
  card.innerHTML = `
    <button class="btn-remove" onclick="event.stopPropagation(); removeClock('${uniqueId}')">×</button>
    <div class="card-content-wrapper">
        <div class="date-display" id="date-${uniqueId}">-- ------- ----</div>
        <div class="card-top-row">
            <div class="identity-block">
                <img class="flag-img" src="https://flagcdn.com/w160/${flag}.png">
            </div>
            <div class="time-block">
                <div class="time" id="${uniqueId}">00:00<span class="seconds">00</span></div>
            </div>
        </div>
    </div>
    <div class="city">${name}</div>
  `;
  display.appendChild(card);
  activeClocks.push({ id: uniqueId, tz, containerId });
}

function addClock(regionName, containerId) {
  const select = document.getElementById(`select-${containerId}`);
  if(select.value !== "") {
    const item = regionalDB[regionName][select.value];
    render(containerId, item.tz, item.name, item.flag);
    select.value = "";
  }
}

function removeClock(id) {
  const el = document.getElementById(`card-${id}`);
  if(el) { el.remove(); activeClocks = activeClocks.filter(c => c.id !== id); }
}

function update() {
  const now = new Date();
  activeClocks.forEach(c => {
    const timeEl = document.getElementById(c.id);
    const dateEl = document.getElementById(`date-${c.id}`);
    if(timeEl && dateEl) {
      try {
        const timeStr = now.toLocaleTimeString("en-US", {timeZone: c.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
        const [h, m, s] = timeStr.split(':');
        timeEl.innerHTML = `${h}:${m}<span class="seconds">${s}</span>`;
        const dateStr = now.toLocaleDateString("en-US", {timeZone: c.tz, day:'2-digit', month:'long', year:'numeric'});
        dateEl.innerText = dateStr;
      } catch(e) {
        console.log("Timezone error: " + c.tz, e);
      }
    }
  });
}

function isFullScreen() {
  return !!(document.fullscreenElement || document.mozFullScreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}

function toggleFullScreen() {
  if (!isFullScreen()) {
    const docEl = document.documentElement;
    if (docEl.requestFullscreen) { docEl.requestFullscreen(); }
    else if (docEl.mozRequestFullScreen) { docEl.mozRequestFullScreen(); }
    else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen(); }
    else if (docEl.msRequestFullscreen) { docEl.msRequestFullscreen(); }
  } else {
    if (document.exitFullscreen) { document.exitFullscreen(); }
    else if (document.mozCancelFullScreen) { document.mozCancelFullScreen(); }
    else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
    else if (document.msExitFullscreen) { document.msExitFullscreen(); }
  }
}

function toggleDarkMode() {
  document.body.classList.toggle('light-mode');
  const btn = document.getElementById('dark-btn');
  btn.innerText = document.body.classList.contains('light-mode') ? 'DARK MODE' : 'LIGHT MODE';
}

window.onload = function() {
  setTimeout(toggleFullScreen, 1000); 
  document.body.addEventListener('click', function() {
    toggleFullScreen();
  });
};

init();
setInterval(update, 1000);
update();
</script>
</body>
</html>
